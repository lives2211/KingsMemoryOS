<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 OpenClaw Multi-Agent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        h1 { font-size: 2em; margin-bottom: 10px; color: #fff; }
        .subtitle { color: #888; }
        .version { 
            display: inline-block; 
            background: #e94560; 
            color: #fff; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.85em;
            margin-left: 10px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 5px;
        }
        .stat-label { color: #888; font-size: 0.9em; }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        @media (max-width: 1000px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        /* Section */
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.3em;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Task Form */
        .task-form textarea {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f0f1a;
            color: #fff;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-row input, .form-row select {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f0f1a;
            color: #fff;
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        button:hover { background: #ff6b6b; }
        button:disabled { background: #444; cursor: not-allowed; }
        
        /* Task List */
        .task-item {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #e94560;
            cursor: pointer;
            transition: all 0.3s;
        }
        .task-item:hover { background: rgba(255,255,255,0.05); }
        .task-title { font-size: 1.1em; font-weight: 600; margin-bottom: 8px; }
        .task-meta {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 0.9em;
        }
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .status-backlog { background: #4a5568; }
        .status-assigned { background: #3182ce; }
        .status-in_progress { background: #d69e2e; }
        .status-review { background: #805ad5; }
        .status-done { background: #38a169; }
        
        /* Agents */
        .agent-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .agent-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; margin-bottom: 4px; }
        .agent-role { color: #e94560; font-size: 0.85em; }
        .agent-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .status-idle { background: #38a169; }
        .status-busy { background: #d69e2e; }
        .status-offline { background: #718096; }
        
        /* Budget Bar */
        .budget-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .budget-fill {
            height: 100%;
            background: linear-gradient(90deg, #38a169, #e94560);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5em;
            cursor: pointer;
            width: auto;
            padding: 0;
        }
        
        /* Audit Log */
        .audit-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9em;
        }
        .audit-time { color: #888; font-size: 0.85em; }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #e94560;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 OpenClaw Multi-Agent System <span class="version">V2.0</span></h1>
            <p class="subtitle">Paperclip-inspired Architecture · Heartbeat Scheduling · Budget Control</p>
        </header>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">-</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeTasks">-</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAgents">5</div>
                <div class="stat-label">Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalBudget">-</div>
                <div class="stat-label">总预算</div>
            </div>
        </div>
        
        <div class="main-grid">
            <!-- Left Column -->
            <div class="left-col">
                <!-- New Task -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">📝 新建任务</div>
                    </div>
                    <div class="task-form">
                        <textarea id="taskDesc" placeholder="描述任务需求，例如：帮我爬取竞品价格数据..."></textarea>
                        <div class="form-row">
                            <input type="number" id="taskBudget" placeholder="预算 (USD)" value="10">
                            <select id="taskPriority">
                                <option value="low">低优先级</option>
                                <option value="normal" selected>普通</option>
                                <option value="high">高优先级</option>
                                <option value="urgent">紧急</option>
                            </select>
                        </div>
                        <button onclick="createTask()" id="createBtn">🚀 智能派发</button>
                    </div>
                </div>
                
                <!-- Tasks -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">📋 任务列表</div>
                        <span id="taskCount">加载中...</span>
                    </div>
                    <div id="tasksList">
                        <div style="text-align:center;padding:40px;color:#666;">
                            <div class="loading"></div>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column -->
            <div class="right-col">
                <!-- Agents -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">🤖 Agents</div>
                    </div>
                    <div id="agentsList">
                        <div style="text-align:center;padding:20px;color:#666;">
                            <div class="loading"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Scheduler Status -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">💓 调度器</div>
                    </div>
                    <div id="schedulerStatus">
                        <div style="text-align:center;padding:20px;color:#666;">
                            <div class="loading"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Task Detail Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>任务详情</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="taskDetail">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3100';
        
        // Load all data
        async function loadAll() {
            await Promise.all([
                loadTasks(),
                loadAgents(),
                loadScheduler()
            ]);
        }
        
        // Load tasks
        async function loadTasks() {
            try {
                const resp = await fetch(`${API_URL}/api/tasks`);
                const tasks = await resp.json();
                
                // Update stats
                document.getElementById('totalTasks').textContent = tasks.length;
                document.getElementById('activeTasks').textContent = tasks.filter(t => t.status === 'in_progress').length;
                document.getElementById('totalBudget').textContent = '$' + tasks.reduce((sum, t) => sum + t.budget.total, 0);
                document.getElementById('taskCount').textContent = `${tasks.length} 个任务`;
                
                // Render tasks
                const container = document.getElementById('tasksList');
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center;padding:40px;color:#666;">
                            <p>暂无任务，在上方创建新任务</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = tasks.slice(0, 10).map(task => `
                    <div class="task-item" onclick="showTaskDetail('${task.id}')">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            <span>👤 @${task.agent_name}</span>
                            <span>💰 $${task.budget.total}</span>
                            <span class="task-status status-${task.status}">${task.status}</span>
                        </div>
                        <div class="budget-bar">
                            <div class="budget-fill" style="width: ${task.budget.utilization * 100}%"></div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载任务失败:', e);
            }
        }
        
        // Load agents
        async function loadAgents() {
            try {
                const resp = await fetch(`${API_URL}/api/agents`);
                const agents = await resp.json();
                
                const container = document.getElementById('agentsList');
                container.innerHTML = Object.entries(agents).map(([id, data]) => {
                    const status = data.state?.status || 'idle';
                    const emoji = {
                        'yitai': '💻',
                        'bingbing': '🎨',
                        'daping': '📊',
                        'spikey': '🔍',
                        'xiaohongcai': '📱'
                    }[id] || '🤖';
                    
                    return `
                        <div class="agent-card">
                            <div class="agent-avatar" style="background: rgba(233,69,96,0.2);">${emoji}</div>
                            <div class="agent-info">
                                <div class="agent-name">@${data.config.name}</div>
                                <div class="agent-role">${data.config.role}</div>
                            </div>
                            <div class="agent-status status-${status}"></div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('加载 Agents 失败:', e);
            }
        }
        
        // Load scheduler
        async function loadScheduler() {
            try {
                const resp = await fetch(`${API_URL}/api/scheduler/status`);
                const data = await resp.json();
                
                document.getElementById('schedulerStatus').innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span>状态</span>
                        <span style="color:${data.running ? '#38a169' : '#e94560'}">
                            ${data.running ? '🟢 运行中' : '🔴 停止'}
                        </span>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
                        <span>检查间隔</span>
                        <span>${data.check_interval}s</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
                        <span>Agents</span>
                        <span>${data.agents_count}</span>
                    </div>
                `;
            } catch (e) {
                console.error('加载调度器失败:', e);
            }
        }
        
        // Create task
        async function createTask() {
            const desc = document.getElementById('taskDesc').value;
            const budget = document.getElementById('taskBudget').value;
            const priority = document.getElementById('taskPriority').value;
            const btn = document.getElementById('createBtn');
            
            if (!desc) {
                alert('请输入任务描述');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loading"></div>';
            
            try {
                const resp = await fetch(`${API_URL}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: desc.slice(0, 50),
                        description: desc,
                        budget: parseFloat(budget) || 0,
                        priority: priority,
                        requester: 'dashboard'
                    })
                });
                
                const data = await resp.json();
                
                if (resp.ok) {
                    alert(`✅ 任务已派发\n\n指派给: @${data.agent_name}\n任务ID: ${data.id}`);
                    document.getElementById('taskDesc').value = '';
                    loadTasks();
                } else {
                    alert('创建失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('网络错误: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 智能派发';
            }
        }
        
        // Show task detail
        async function showTaskDetail(taskId) {
            try {
                const resp = await fetch(`${API_URL}/api/tasks/${taskId}`);
                const task = await resp.json();
                
                document.getElementById('taskDetail').innerHTML = `
                    <div style="margin-bottom:20px;">
                        <h3>${task.title}</h3>
                        <p style="color:#888;margin-top:10px;">${task.description}</p>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;">
                        <div><strong>状态:</strong> <span class="task-status status-${task.status}">${task.status}</span></div>
                        <div><strong>优先级:</strong> ${task.priority}</div>
                        <div><strong>指派给:</strong> @${task.agent_name}</div>
                        <div><strong>请求者:</strong> ${task.requester}</div>
                        <div><strong>预算:</strong> $${task.budget.total}</div>
                        <div><strong>已花费:</strong> $${task.budget.spent}</div>
                    </div>
                    <div style="margin-bottom:20px;">
                        <strong>预算使用率:</strong>
                        <div class="budget-bar" style="margin-top:10px;">
                            <div class="budget-fill" style="width: ${task.budget.utilization * 100}%"></div>
                        </div>
                        <span style="color:#888;font-size:0.9em;">${(task.budget.utilization * 100).toFixed(1)}%</span>
                    </div>
                    <div>
                        <strong>审计日志:</strong>
                        ${task.audit_log.slice(-5).map(log => `
                            <div class="audit-item">
                                <span class="audit-time">${new Date(log.timestamp).toLocaleString()}</span>
                                <span>${log.event}</span> by ${log.actor}
                            </div>
                        `).join('') || '<p style="color:#666;">暂无日志</p>'}
                    </div>
                `;
                
                document.getElementById('taskModal').classList.add('show');
            } catch (e) {
                console.error('加载任务详情失败:', e);
            }
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('show');
        }
        
        // Auto refresh
        loadAll();
        setInterval(loadAll, 10000);
    </script>
</body>
</html>
